services:
  - type: web
    name: zapp-internal-dashboard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: ZAPP_API_BASE_URL
        sync: false
      - key: ZAPP_API_TOKEN
        sync: false
